<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkart Clone</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            font-family: Arial, sans-serif;
            background-color: #f1f3f6;
        }

        /* MAIN */
        .main-container{
            width: 100%;
            min-height: 100vh;
        }

        /* HEADER */
        .header{
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            background-color: #f1f3f6;
        }

        /* LEFT */
        .left-section{
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* LOGO */
        .logo{
            background-color: #ffe500;
            padding: 10px 18px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
        }

        .logo .f{
            color: #2874f0;
            margin-right: 5px;
        }

        /* MENU */
        .menu{
            background-color: #e5e5e5;
            padding: 10px 16px;
            border-radius: 10px;
            cursor: pointer;
        }

        .menu:hover{
            background-color: #dcdcdc;
        }

        /* RIGHT */
        .right-section{
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 14px;
        }

        .right-section a{
            color: #2874f0;
            text-decoration: none;
        }

        .right-section a:hover{
            text-decoration: underline;
        }

        /* SEARCH BAR */
        .search-bar{
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: white;
            padding: 15px 25px;
            border-bottom: 1px solid #ddd;
        }

        .search-bar input{
            width: 62%;
            padding: 14px;
            border: 2px solid #2874f0;
            border-radius: 10px;
            outline: none;
            font-size: 15px;
        }

        .search-icons{
            display: flex;
            gap: 25px;
            font-size: 15px;
            cursor: pointer;
        }

        /* CATEGORY BAR */
        .category-bar{
            width: 100%;
            display: flex;
            justify-content: space-around;
            align-items: center;
            background-color: white;
            padding: 15px 0;
            border-bottom: 1px solid #ddd;
        }

        .category{
            font-size: 14px;
            cursor: pointer;
            padding-bottom: 5px;
        }

        .category.active{
            border-bottom: 3px solid #2874f0;
            font-weight: bold;
        }

        /* BODY */
        .container-body{
            padding: 20px;
        }

        /* SLIDER */
        .container-slider{
            width: 100%;
            overflow: hidden;
            margin-bottom: 25px;
        }

        .slider-wrapper{
            display: flex;
            gap: 15px;
        }

        .slide{
            width: 33%;
        }

        .slide img{
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 12px;
        }

        /* PRODUCTS */
        .product-section{
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
        }

        .product-card{
            width: 280px;
            background-color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .product-card:hover{
            transform: scale(1.05);
        }

        .product-card img{
            width: 100%;
            height: 180px;
            object-fit: contain;
        }

        .product-card h3{
            margin-top: 15px;
            font-size: 24px;
        }

        .product-card p{
            margin-top: 10px;
            font-size: 15px;
            font-weight: bold;
        }

    </style>

</head>

<body>

    <div class="main-container">

        <!-- HEADER -->
        <div class="header">

            <div class="left-section">

                <div class="logo">
                    <span class="f">f</span> Flipkart

                <div class="menu">
                    ✈️ Travel
                </div>

            </div>

            <div class="right-section">
                <span>📍 Location not set</span>
                <a href="#">Select delivery location ></a>
            </div>

        </div>

        <!-- SEARCH BAR -->
        <div class="search-bar">

            <input type="text" placeholder="Search for Products, Brands and More">

            <div class="search-icons">

        </div>

    </div>

</body>

</html>
