<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkart</title>

    <style>

        /* Header */
        .header {
            width: 90%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 25px 12px 25px;
            background-color: #f1f3f6;
            font-family: Arial, sans-serif;
        }

        /* Left section */
        .left-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* Logo */
        .logo {
            background-color: #ffe500;
            padding: 8px 18px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 18px;
        }

        /* f icon */
        .logo .f {
            color: #2874f0;
            font-weight: bold;
            margin-right: 5px;
        }

        /* Menu */
        .menu {
            background-color: #e5e5e5;
            padding: 8px 15px;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
        }

        .menu:hover {
            background-color: #dcdcdc;
        }

        /* Right section */
        .right-section {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 14px;
        }

        /* Location link */
        .location-text a {
            color: #2874f0;
            text-decoration: none;
            font-weight: 500;
        }

        .location-text a:hover {
            text-decoration: underline;
        }

        /* SEARCH BAR */
        .search-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 25px;
            background-color: white;
            border-bottom: 1px solid #ddd;
        }

        /* Input */
        .search-bar input {
            width: 60%;
            padding: 12px;
            border: 2px solid #2874f0;
            border-radius: 10px;
            outline: none;
            font-size: 14px;
        }

        /* Right icons */
        .search-icons {
            display: flex;
            gap: 20px;
            font-size: 14px;
            cursor: pointer;
        }

        /* CATEGORY BAR */
        .category-bar {
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            background-color: white;
            border-bottom: 1px solid #ddd;
        }

        /* Each category */
        .category {
            font-size: 13px;
            cursor: pointer;
            padding-bottom: 5px;
        }

        /* Active underline */
        .category.active {
            border-bottom: 3px solid #2874f0;
            font-weight: bold;
        }

        /* Main */
        .main-container {
            width: 100%;
            min-height: 100vh;
            background-color: #f1f3f6;
        }

        /* Body */
        .container-body {
            padding: 20px;
        }

        .container-slider {
            overflow: hidden;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        /* Wrapper */
        .slider-wrapper {
            display: flex;
        }

        /* Each slide */
        .slide {
            min-width: 20%;
            margin: 6px;
        }

        /* Image */
        .slide img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 10px;
        }

        /* Product section */
        .product-section {
            display: flex;
            gap: 20px;
        }

        /* Card */
        .product-card {
            background-color: white;
            padding: 15px;
            border-radius: 12px;
            width: 200px;
            text-align: center;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            cursor: pointer;
        }

        /* Image */
        .product-card img {
            width: 100%;
            height: 150px;
            object-fit: contain;
        }

        /* Text */
        .product-card h4 {
            margin-top: 10px;
        }

        /* Hover effect */
        .product-card:hover {
            transform: scale(1.05);
            transition: 0.3s;
        }

    </style>

</head>

<body>

    <div class="main-container">

        <!-- Header -->
        <div class="header">

            <!-- Left -->
            <div class="left-section">

</body>
