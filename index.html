
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkart</title>
    <link rel="stylesheet" href="style2.css">
</head>

<body>

    <div class="main-container">

        <!-- Header -->
        <div class="header">

            <!-- Left -->
            <div class="left-section">
                <div class="logo">
                    <span class="f">f</span> Flipkart
                </div>

                <div class="menu">
                    ✈️ Travel
                </div>
            </div>

            <!-- Right -->
            <div class="right-section">
                <span>📍 Location not set</span>
                <a href="#">Select delivery location ></a>
            </div>

        </div>

        <!-- SEARCH BAR -->
        <div class="search-bar">

            <input type="text" placeholder="Search for Products, Brands and More">

            <div class="search-icons">
                <span>👤 Login</span>
                <span>⋮ More</span>
                <span>🛒 Cart</span>
            </div>

        </div>

        <!-- CATEGORY BAR -->
        <div class="category-bar">

            <div class="category active">For You</div>
            <div class="category">Fashion</div>
            <div class="category">Mobiles</div>
            <div class="category">Beauty</div>
            <div class="category">Electronics</div>
            <div class="category">Home</div>
            <div class="category">Appliances</div>
            <div class="category">Toys</div>
            <div class="category">Food</div>
            <div class="category">Books</div>
            <div class="category">Furniture</div>

        </div>

        <!-- Body -->
        <div class="container-body">
            <div class="container-slider">
                <div class="slider-wrapper">

                    <div class="slide">
                        <img src="flipkart1.webp" alt="">
                    </div>

                    <div class="slide">
                        <img src="flipkart2.webp" alt="">
                    </div>

                    <div class="slide">
                        <img src="flipkart3.webp" alt="">
                    </div>

                </div>
            </div>


            <div class="product-section">

                <div class="product-card">
                    <img src="https://imgs.search.brave.com/jcDwNEXew3jOaT7rkarW83iL8pSSdkOVnFaireAgUBA/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly9ydWtt/aW5pbTIuZmxpeGNh/cnQuY29tL2ltYWdl/LzgwMC8xMDcwL3hp/ZjBxL21vYmlsZS93/L2Qvby8xNXItNWct/aTI1MDgtaXFvby1v/cmlnaW5hbC1pbWFo/aGZwYzJlam1naHln/LmpwZWc_cT04MA"
                        alt="IQOO 15R">
                    <h4>Just ₹40000</h4>
                </div>

                <div class="product-card">
                    <img src="https://imgs.search.brave.com/LNocikxc1yZv_kWN4ZNJhEdWzNrCAcnWwLTYPtJ_7sk/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly93d3cu/bGl2ZW1pbnQuY29t/L2xtLWltZy9pbWcv/MjAyNS8xMC8wNi8z/ODJ4MjE0L2tubm5u/bm5ubm5fMTc1OTcy/NDMxMTAwMV8xNzU5/NzI0MzE2MzQzLnBu/Zw"
                        alt="iPhone 16 pro max">
                    <h4>Up to 70% Off</h4>
                </div>

                <div class="product-card">
                    <img src="https://imgs.search.brave.com/Zj8SazspksyzADIU3EWLGWxpY7bCVauDJFS0s3bbUFM/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly9ydWtt/aW5pbTIuZmxpeGNh/cnQuY29tL2ltYWdl/LzMxMi8zMTIveGlm/MHEvbGFwdG9wLXNr/aW4tZGVjYWwvNS9u/LzMvZnVsbC1ib2R5/LWxhcHRvcC1za2lu/LXN0aWNrZXItc2F0/b3J1LWdvam8tYWNp/ZC1ibHVlLWV5ZXMt/anVqdXRzdS1vcmln/aW5hbC1pbWFndzV4/cGp4YWdteXBrLmpw/ZWc_cT03MCZjcm9w/PWZhbHNl"
                        alt="Laptop Skin">
                    <h4> Starting from ₹199</h4>
                </div>

            </div>
        </div>

    </div>

</body>

</html>
